<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>ตารางสอน · CDTI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #0A2647;
    --navy-700: #144272;
    --navy-400: #6B7C95;
    --navy-100: #EAEEF4;
    --navy-50: #F4F7FB;
    --yellow: #F5C518;
    --yellow-100: #FFF4CC;
    --border: #E5E9F0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'IBM Plex Sans Thai', 'IBM Plex Sans', sans-serif;
    color: var(--navy);
    background: #ECEEF3;
    -webkit-font-smoothing: antialiased;
  }
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--navy); color: #fff;
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid var(--yellow);
  }
  .toolbar h1 { font-size: 16px; margin: 0; font-weight: 700; }
  .toolbar .actions { display: flex; gap: 10px; align-items: center; }
  .toolbar button {
    background: var(--yellow); color: var(--navy);
    border: none; padding: 8px 16px; border-radius: 8px;
    font-weight: 700; cursor: pointer; font-family: inherit;
    font-size: 13px;
  }
  .toolbar button.outline {
    background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.3);
  }

  .page {
    /* Landscape A4 */
    width: 297mm; min-height: 210mm; margin: 28px auto;
    background: #fff;
    padding: 14mm;
    box-shadow: 0 4px 24px rgba(10,38,71,0.12);
    position: relative;
  }

  .header {
    display: flex; align-items: center; gap: 16px;
    border-bottom: 3px solid var(--navy);
    padding-bottom: 12px; margin-bottom: 14px;
  }
  .header img { height: 50px; }
  .header h2 { font-size: 20px; margin: 0; font-weight: 800; }
  .header .sub { font-size: 11px; color: var(--navy-400); margin-top: 2px; }
  .header .badge {
    display: inline-block; padding: 4px 12px; border-radius: 999px;
    font-size: 11px; font-weight: 700; background: var(--yellow-100); color: var(--navy);
  }

  .meta {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 12px;
  }
  .meta .item { background: var(--navy-50); padding: 6px 10px; border-radius: 6px; border-left: 3px solid var(--yellow); }
  .meta .lbl { font-size: 10px; font-weight: 700; color: var(--navy-400); text-transform: uppercase; }
  .meta .val { font-size: 12px; font-weight: 700; color: var(--navy); }

  table.timetable {
    width: 100%; border-collapse: collapse;
    font-size: 11px;
  }
  table.timetable th, table.timetable td {
    border: 1px solid var(--border);
    padding: 4px 6px; vertical-align: top;
  }
  table.timetable thead th {
    background: var(--navy); color: #fff;
    font-weight: 700; text-align: center;
  }
  table.timetable thead th .pt { font-size: 9px; opacity: .8; font-family: monospace; font-weight: 500; margin-top: 2px; }
  table.timetable td.day {
    text-align: center; font-weight: 700; font-size: 12px;
    padding: 8px 4px; width: 80px;
  }
  table.timetable td.slot { padding: 0; }
  table.timetable .cell {
    padding: 6px 8px; min-height: 64px;
    border-left: 4px solid; border-radius: 4px;
  }
  table.timetable .cell .sname { font-size: 11px; font-weight: 700; line-height: 1.25; color: var(--navy); }
  table.timetable .cell .scode { font-size: 9px; font-family: monospace; color: var(--navy-400); margin-top: 1px; }
  table.timetable .cell .smeta { font-size: 9px; color: var(--navy-400); margin-top: 2px; }
  table.timetable .cell .room {
    display: inline-block; background: rgba(0,0,0,.06); padding: 1px 6px;
    border-radius: 3px; font-weight: 600; margin-top: 2px;
  }
  table.timetable td.empty {
    background: repeating-linear-gradient(45deg, transparent, transparent 6px, #fafbfc 6px, #fafbfc 12px);
    min-height: 64px;
  }

  .summary {
    margin-top: 14px;
    display: grid; grid-template-columns: 1.2fr 1fr;
    gap: 12px;
  }
  .summary .list { font-size: 11px; }
  .summary .list table { width: 100%; border-collapse: collapse; }
  .summary .list th, .summary .list td { padding: 4px 6px; border: 1px solid var(--border); }
  .summary .list thead { background: var(--navy-50); }
  .summary .list thead th { font-weight: 700; }
  .summary .list .colorBar { display: inline-block; width: 4px; height: 14px; vertical-align: middle; margin-right: 6px; border-radius: 2px; }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat { background: var(--navy-50); border-radius: 8px; padding: 10px 12px; border-left: 3px solid var(--yellow); }
  .stat .l { font-size: 10px; color: var(--navy-400); font-weight: 700; text-transform: uppercase; }
  .stat .v { font-size: 22px; font-weight: 800; color: var(--navy); line-height: 1.1; }

  .footer {
    margin-top: 14px;
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--navy-400);
    border-top: 1px solid var(--border); padding-top: 8px;
  }

  @media print {
    .toolbar { display: none; }
    body { background: #fff; }
    .page { margin: 0; box-shadow: none; padding: 10mm; }
    @page { size: A4 landscape; margin: 0; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>🗓 ตารางสอน — กด "พิมพ์ / บันทึก PDF" เพื่อดาวน์โหลด</h1>
  <div class="actions">
    <button class="outline" onclick="window.close()">ปิด</button>
    <button onclick="window.print()">🖨 พิมพ์ / บันทึก PDF</button>
  </div>
</div>

<div id="content"></div>

<script>
  const KEY = 'cdti_attendance_v3';
  const data = JSON.parse(localStorage.getItem(KEY) || '{}');
  const params = new URLSearchParams(location.search);
  const teacherId = params.get('teacher');
  const year = params.get('year') || data.meta?.currentYear || '2568';

  const DAYS = [
    { n: 1, full: 'จันทร์', color: '#FEF3C7' },
    { n: 2, full: 'อังคาร', color: '#FEE2E2' },
    { n: 3, full: 'พุธ', color: '#D1FAE5' },
    { n: 4, full: 'พฤหัสบดี', color: '#FED7AA' },
    { n: 5, full: 'ศุกร์', color: '#DBEAFE' },
  ];

  const COLORS = [
    { bg: '#FFF4CC', border: '#F5C518' },
    { bg: '#DBEAFE', border: '#3B82F6' },
    { bg: '#D1FAE5', border: '#10B981' },
    { bg: '#FCE7F3', border: '#EC4899' },
    { bg: '#FED7AA', border: '#F97316' },
    { bg: '#E0E7FF', border: '#6366F1' },
    { bg: '#FEE2E2', border: '#EF4444' },
    { bg: '#CFFAFE', border: '#06B6D4' },
    { bg: '#FEF3C7', border: '#F59E0B' },
    { bg: '#F3E8FF', border: '#A855F7' },
  ];
  function colorFor(id) {
    let h = 0;
    for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
    return COLORS[h % COLORS.length];
  }

  function render() {
    const teacher = (data.users || []).find(u => u.id === teacherId);
    if (!teacher) {
      document.getElementById('content').innerHTML = '<div class="page"><h2>ไม่พบอาจารย์</h2></div>';
      return;
    }

    const periods = data.meta?.periods || [];
    const subs = (data.subjects || []).filter(s => s.teacherId === teacherId && s.year === year);

    // Build grid
    const grid = {};
    for (let d = 1; d <= 5; d++) grid[d] = {};
    subs.forEach(s => {
      (s.schedule || []).forEach(slot => {
        for (let p = slot.startPeriod; p <= slot.endPeriod; p++) {
          if (p === slot.startPeriod) {
            grid[slot.day][p] = { subject: s, span: slot.endPeriod - slot.startPeriod + 1, room: slot.room };
          } else {
            grid[slot.day][p] = { spanned: true };
          }
        }
      });
    });

    const totalPeriods = subs.reduce((a, s) => a + (s.schedule || []).reduce((b, sl) => b + (sl.endPeriod - sl.startPeriod + 1), 0), 0);
    const totalHours = subs.reduce((a, s) => a + s.hours, 0);
    const classes = [...new Set(subs.map(s => s.classroomId))];

    let tableRows = DAYS.map(day => {
      let cells = `<td class="day" style="background:${day.color};">วัน${day.full}</td>`;
      periods.forEach(p => {
        const c = grid[day.n]?.[p.n];
        if (c?.spanned) return;
        if (!c) {
          cells += '<td class="empty"></td>';
          return;
        }
        const s = c.subject;
        const col = colorFor(s.id);
        const cls = (data.classrooms || []).find(x => x.id === s.classroomId);
        cells += `<td class="slot" colspan="${c.span}">
          <div class="cell" style="background:${col.bg};border-color:${col.border};">
            <div class="sname">${s.name}</div>
            <div class="scode">${s.code} · ${s.hours} ชม.</div>
            <div class="smeta">📚 ${cls?.name || ''}${c.room ? ` <span class="room">${c.room}</span>` : ''}</div>
          </div>
        </td>`;
      });
      return `<tr>${cells}</tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="page">
        <div class="header">
          <img src="assets/logo.png" />
          <div style="flex:1;">
            <h2>ตารางสอนอาจารย์</h2>
            <div class="sub">สถาบันเทคโนโลยีจิตรลดา · Chitralada Technology Institute</div>
          </div>
          <span class="badge">ปีการศึกษา ${year}</span>
        </div>

        <div class="meta">
          <div class="item"><div class="lbl">อาจารย์ผู้สอน</div><div class="val">${teacher.name}</div></div>
          <div class="item"><div class="lbl">แผนกวิชา</div><div class="val">${teacher.department || '—'}</div></div>
          <div class="item"><div class="lbl">รายวิชาที่สอน</div><div class="val">${subs.length} วิชา · ${classes.length} ห้อง</div></div>
          <div class="item"><div class="lbl">คาบต่อสัปดาห์</div><div class="val">${totalPeriods} คาบ · ${totalHours} ชม.</div></div>
        </div>

        <table class="timetable">
          <thead>
            <tr>
              <th style="width:80px;">วัน \\ คาบ</th>
              ${periods.map(p => `<th>คาบ ${p.n}<div class="pt">${p.start}–${p.end}</div></th>`).join('')}
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>

        <div class="summary">
          <div class="list">
            <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px;">รายวิชาที่รับผิดชอบ</div>
            <table>
              <thead><tr>
                <th style="width:30px;">#</th>
                <th style="width:90px;">รหัส</th>
                <th>ชื่อวิชา</th>
                <th>ชั้นเรียน</th>
                <th style="width:60px;">ชม.</th>
                <th style="width:90px;">วัน·คาบ</th>
              </tr></thead>
              <tbody>
                ${subs.map((s, i) => {
                  const col = colorFor(s.id);
                  const cls = (data.classrooms || []).find(x => x.id === s.classroomId);
                  const slots = (s.schedule || []).map(sl => {
                    const dy = DAYS.find(d => d.n === sl.day);
                    return `${dy?.full?.slice(0,2)||''}·${sl.startPeriod}${sl.endPeriod!==sl.startPeriod?'-'+sl.endPeriod:''}`;
                  }).join(', ');
                  return `<tr>
                    <td style="text-align:center;">${i+1}</td>
                    <td style="font-family:monospace;font-size:10px;">${s.code}</td>
                    <td><span class="colorBar" style="background:${col.border};"></span>${s.name}</td>
                    <td>${cls?.name || '-'}</td>
                    <td style="text-align:center;font-weight:700;">${s.hours}</td>
                    <td style="font-size:10px;">${slots || '-'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>

          <div>
            <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px;">สรุปภาระงานสอน</div>
            <div class="stats">
              <div class="stat"><div class="l">รายวิชา</div><div class="v">${subs.length}</div></div>
              <div class="stat"><div class="l">ชั้นเรียน</div><div class="v">${classes.length}</div></div>
              <div class="stat"><div class="l">คาบต่อสัปดาห์</div><div class="v">${totalPeriods}</div></div>
              <div class="stat"><div class="l">ชั่วโมงรวม/ภาค</div><div class="v">${totalHours}</div></div>
            </div>
            <div style="margin-top:18px;font-size:11px;">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;padding-top:32px;text-align:center;">
                <div style="border-top:1px dashed var(--navy-400);padding-top:6px;">(${teacher.name})<br/>อาจารย์ผู้สอน</div>
                <div style="border-top:1px dashed var(--navy-400);padding-top:6px;">(....................................)<br/>หัวหน้างานวิชาการ</div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer">
          <div>พิมพ์เมื่อ ${new Date().toLocaleString('th-TH')} · ระบบเช็คชื่อ CDTI</div>
          <div>Sheet: ${data.meta?.sheetId || '-'}</div>
        </div>
      </div>
    `;
  }

  render();
</script>
</body>
</html>
